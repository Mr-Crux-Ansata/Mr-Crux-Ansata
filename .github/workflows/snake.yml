name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Mr-Crux-Ansata

          outputs: |
            dist/github-snake.svg?palette=github-dark&color_snake=FF5CA8&color_dots=%23151222,%2330203C,%234B2D53,%23A45497,%23F6A8C8

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: output
