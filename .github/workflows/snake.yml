name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - uses: Platane/snk@v3
      with:
        github_user_name: Mr-Crux-Ansata
        outputs: |
          dist/github-contribution-grid-snake-dark.svg?color_snake=F8A5C2&color_dots=090B16-151B35-304A6E-6CB6FF-F8A5C2

    - uses: crazy-max/ghaction-github-pages@v3
      with:
        target_branch: output
        build_dir: dist
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
