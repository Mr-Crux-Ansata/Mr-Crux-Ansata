name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Mr-Crux-Ansata

          outputs: |
            dist/github-snake.gif?palette=github-dark&color_snake=FF73B3&color_dots=#161B22,#241B32,#4B2D53,#FF4F97,#F6A8C8

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
