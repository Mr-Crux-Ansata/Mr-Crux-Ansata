name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Mr-Crux-Ansata

          outputs: |
            dist/github-snake.svg?palette=github-dark&color_snake=%23c84781&color_dots=%23251239,%23481c4a,%23822d69,%23a9397d,%23f578bd

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: output
